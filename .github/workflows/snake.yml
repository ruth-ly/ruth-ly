name: generate snake 🐍

on:
  schedule:
    - cron: "0 0 * * *" # runs daily at midnight UTC
  workflow_dispatch: # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ruth-ly
          outputs: |
            dist/github-snake.svg?color_snake=#c9a7eb&color_dots=#ebedf0,#f5c2e7,#e8a8d8,#d28ae0,#c9a7eb
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#c9a7eb

      - name: push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
